<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#f9f8f5;--border:#e2e0d8;--border2:#ccc9be;
  --text:#1a1916;--text2:#6b6960;--text3:#9e9b92;
  --green:#2d6a4f;--green-bg:#d8f3dc;--red:#9b2226;--red-bg:#fde8e8;
  --blue:#1d4e89;--blue-bg:#dbeafe;--amber:#92400e;--amber-bg:#fef3c7;
  --today:#1d4e89;--today-bg:#dbeafe;
  --row-h:32px;--col-cat:130px;--col-total:58px;--col-day:34px;--hdr-h:44px;--sb-w:320px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;z-index:100}
.logo{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.04em}
.sep{width:1px;height:20px;background:var(--border)}
.mnav{display:flex;align-items:center;gap:2px}
.mnav button{border:none;background:none;cursor:pointer;color:var(--text2);padding:4px 7px;border-radius:4px;font-size:16px;line-height:1}
.mnav button:hover{background:var(--bg)}
.mlbl{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;min-width:110px;text-align:center}
.ta{margin-left:auto;display:flex;gap:6px;align-items:center}
.btn{padding:6px 12px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);white-space:nowrap}
.btn:hover{background:var(--bg)}
.btn:disabled{opacity:.35;cursor:default}
.btn-p{background:var(--text);color:#fff;border-color:var(--text)}.btn-p:hover{background:#333}
.btn-danger{background:#dc2626;color:#fff;border-color:#dc2626}.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:4px 9px;font-size:12px}.btn-ghost{border-color:transparent}.btn-ghost:hover{background:var(--bg);border-color:var(--border)}
.tabbar{height:36px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 18px;flex-shrink:0}
.tab{padding:5px 15px 6px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'DM Sans',sans-serif}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.tab:hover:not(.active){color:var(--text)}
.main{flex:1;display:flex;overflow:hidden}
.sbar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.si{flex:1;padding:9px 14px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:1px}
.si:last-child{border-right:none}
.sl{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
.sv{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.pos{color:var(--green)}.neg{color:var(--red)}
.selbar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:8px;padding:8px 18px;font-family:'DM Mono',monospace;font-size:13px;display:flex;gap:16px;align-items:center;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.25);pointer-events:none;opacity:0;transition:opacity .15s}
.selbar.show{opacity:1}
.sheet-wrap{flex:1;overflow:auto}
.stbl{border-collapse:collapse;font-family:'DM Mono',monospace;font-size:12px;min-width:max-content}

/* header row */
.stbl thead th{height:var(--hdr-h);background:var(--surface2);border:1px solid var(--border);padding:0 4px;white-space:nowrap;position:sticky;top:0;z-index:10;font-weight:500;color:var(--text2);font-size:13px;text-align:center;user-select:none;vertical-align:middle}
.stbl thead th.ch{text-align:left;width:var(--col-cat);min-width:var(--col-cat);position:sticky;left:0;z-index:20;background:var(--surface2);font-size:11px}
.stbl thead th.th{width:var(--col-total);min-width:var(--col-total);position:sticky;left:var(--col-cat);z-index:20;background:var(--surface2);font-size:11px}
.stbl thead th.dh{width:var(--col-day);min-width:var(--col-day);line-height:1.2}
.stbl thead th .daynum{font-size:13px;font-weight:600;display:block}
.stbl thead th .dayname{font-size:9px;font-weight:400;color:var(--text3);display:block}
/* today highlight in header */
.stbl thead th.today-col{background:var(--today-bg)!important;color:var(--today)!important}
.stbl thead th.today-col .daynum{color:var(--today);font-weight:700}
.stbl thead th.today-col .dayname{color:var(--blue)}
/* month/week start borders */
.stbl thead th.month-start{border-left:3px solid #888!important}
.stbl thead th.week-start{border-left:2px solid var(--border2)!important}

.cc{position:sticky;left:0;z-index:5;border:1px solid var(--border);padding:0 7px;height:var(--row-h);white-space:nowrap;font-weight:500;font-size:12px;cursor:pointer;vertical-align:middle}
.cc:hover{filter:brightness(.97)}
.tc{position:sticky;left:var(--col-cat);z-index:5;border:1px solid var(--border);padding:0 6px;height:var(--row-h);text-align:right;font-weight:500;white-space:nowrap;vertical-align:middle}
.dc{border:1px solid var(--border);height:auto;min-height:var(--row-h);vertical-align:top;padding:0;position:relative;min-width:var(--col-day)}
.dc.month-start{border-left:3px solid #888!important}
.dc.week-start{border-left:2px solid var(--border2)!important}
/* today column — only header and bottom day row get highlight, NOT data cells */

/* row types */
tr.ri .cc{color:var(--green);border-left:3px solid var(--green)}
tr.ri td{background:#f6fdf8}
tr.rs .cc{border-left:3px solid var(--border2)}
tr.rs td{background:var(--surface)}
tr.rp .cc{color:var(--amber);border-left:3px solid var(--amber)}
tr.rp td{background:#fffbf0}
tr.rt td{background:var(--surface2);font-weight:500}
tr.rt .cc{color:var(--text2);border-left:3px solid var(--border2);cursor:default}
tr.rdayrow td{background:var(--surface2);border-top:2px solid var(--border2)}
tr.rdayrow .cc{color:var(--text2);cursor:default;border-left:3px solid var(--border2)}
tr.rdayrow td.today-col{background:var(--today-bg)!important;color:var(--today)!important}
tr.rdayrow td .daynum{font-size:13px;font-weight:700;display:block}
tr.rdayrow td .dayname{font-size:9px;color:var(--text3);display:block}
tr.rb td{background:#eff6ff;font-weight:500}
tr.rb .cc{color:var(--blue);border-left:3px solid var(--blue);cursor:default}

/* cell content */
.cstack{display:flex;flex-direction:column;width:100%}
.ce{padding:3px 5px;border-bottom:1px solid var(--border);cursor:pointer;min-height:28px;display:flex;flex-direction:column;justify-content:center;transition:background .1s;position:relative}
.ce:last-child{border-bottom:none}
.ce:hover{background:rgba(0,0,0,.04)}
/* selection overlay */
.ce.sel::after{content:'';position:absolute;inset:0;background:rgba(29,78,137,.18);border:2px solid var(--blue);pointer-events:none;border-radius:1px}
.ca{font-size:12px;font-family:'DM Mono',monospace;text-align:right;white-space:nowrap}
.ca.confirmed{font-weight:500}.ca.forecast{opacity:.6}
/* default colours only when no custom colour set */
.ca.income-default{color:var(--green)}.ca.spend-default{color:var(--red)}
.cn{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px;font-style:italic}
.cadd{width:100%;min-height:var(--row-h);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:16px;cursor:pointer;opacity:0}
.dc:hover .cadd{opacity:1}
.spip{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.spip.shared{background:var(--blue)}.spip.personal{background:var(--amber)}

/* sidebar */
.sidebar{width:var(--sb-w);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar.hidden{display:none}
.sbh{padding:12px 14px 9px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sbh h3{font-size:13px;font-weight:500;flex:1}
.sbb{flex:1;overflow-y:auto;padding:14px}
.sbf{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px}
.ecard{border:1px solid var(--border);border-radius:6px;padding:8px 10px;display:flex;align-items:flex-start;gap:8px;cursor:pointer;margin-bottom:6px}
.ecard:hover{border-color:var(--border2);background:var(--bg)}
.ecamt{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;white-space:nowrap}
.ecamt.income{color:var(--green)}.ecamt.spend{color:var(--red)}
.ecmeta{flex:1;display:flex;flex-direction:column;gap:2px}
.ecnote{font-size:11px;color:var(--text3);font-style:italic}
.ebadge{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:500;font-family:'DM Mono',monospace}
.bc{background:var(--green-bg);color:var(--green)}.bfo{background:var(--amber-bg);color:var(--amber)}.bp{background:var(--amber-bg);color:var(--amber)}

/* forms */
.fg{margin-bottom:13px}
.fl{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
.fc{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:5px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);outline:none}
.fc:focus{border-color:var(--blue)}
textarea.fc{resize:vertical;min-height:52px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tgg{display:flex;border:1px solid var(--border2);border-radius:5px;overflow:hidden}
.to{flex:1;padding:7px 8px;text-align:center;font-size:12px;cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;color:var(--text2)}
.to.active{background:var(--text);color:#fff}
.to.active.income{background:var(--green)}.to.active.spend{background:var(--red)}

/* modal */
.mbd{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:flex;align-items:center;justify-content:center}
.mbd.hidden{display:none}
.modal{background:var(--surface);border-radius:10px;width:460px;max-width:96vw;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.mhdr{padding:14px 18px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.mhdr h3{flex:1;font-size:14px;font-weight:500}
.mbody{padding:15px 18px;max-height:74vh;overflow-y:auto}
.mftr{padding:11px 18px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.dcbox{background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:9px 12px;margin-top:9px;display:none;font-size:13px;color:var(--red)}
.dcbox.show{display:block}

/* context menu */
.ctx{position:fixed;z-index:400;background:var(--surface);border:1px solid var(--border2);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:4px 0;min-width:200px;max-height:80vh;overflow-y:auto}
.ctx.hidden{display:none}
.cxi{padding:7px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text)}
.cxi:hover{background:var(--bg)}
.cxsep{height:1px;background:var(--border);margin:3px 0}
.cxlbl{padding:3px 14px;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em}
.cgrid{display:grid;grid-template-columns:repeat(8,20px);gap:3px;padding:6px 14px}
.csw{width:20px;height:20px;border-radius:3px;cursor:pointer;border:1px solid rgba(0,0,0,.12);transition:transform .1s}
.csw:hover{transform:scale(1.25)}
.ftbar{padding:6px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ftbtn{padding:3px 9px;font-size:12px;border:1px solid var(--border2);border-radius:4px;cursor:pointer;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.4}
.ftbtn:hover{background:var(--bg)}
.ftbtn.on{background:var(--text);color:#fff;border-color:var(--text)}
.ftsz{width:50px;padding:3px 6px;font-size:12px;border:1px solid var(--border2);border-radius:4px;outline:none;font-family:'DM Mono',monospace}
.ftcolgrid{display:grid;grid-template-columns:repeat(6,22px);gap:3px;padding:4px 14px}
.ftcsw{width:22px;height:22px;border-radius:3px;cursor:pointer;border:1px solid rgba(0,0,0,.15);transition:transform .1s}
.ftcsw:hover{transform:scale(1.2)}

/* split */
#view-split{flex:1;overflow-y:auto;padding:22px;display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;min-width:240px;flex:1}
.scard h3{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:12px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
.srow{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.srow.tot{font-weight:500;border-top:2px solid var(--border2);border-bottom:none;margin-top:4px;padding-top:8px}
.sval{font-family:'DM Mono',monospace}
.src{background:var(--text);color:#fff;border-radius:8px;padding:22px;text-align:center;flex:1;min-width:240px}
.srclbl{font-size:11px;opacity:.6;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.srcamt{font-family:'DM Mono',monospace;font-size:34px;font-weight:500;margin-bottom:18px}
.srsave{display:flex;gap:10px;justify-content:center}
.srsi{background:rgba(255,255,255,.1);border-radius:6px;padding:9px 14px;text-align:center}
.srsil{font-size:11px;opacity:.6;margin-bottom:3px}
.srsiv{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.srig{margin-bottom:13px;text-align:left}
.srig label{font-size:11px;opacity:.7;display:block;margin-bottom:3px;font-family:'DM Mono',monospace}
.srig input{width:100%;padding:6px 9px;border:1px solid rgba(255,255,255,.2);border-radius:5px;background:rgba(255,255,255,.1);color:#fff;font-family:'DM Mono',monospace;font-size:13px;outline:none}
.srig input:focus{border-color:rgba(255,255,255,.5)}

/* entry form */
#view-entry{flex:1;overflow-y:auto;padding:22px;display:flex;justify-content:center}
.efw{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:22px;width:100%;max-width:540px;height:fit-content}
.efw h2{font-size:14px;font-weight:500;margin-bottom:18px}

/* categories */
#view-cats{flex:1;overflow-y:auto;padding:22px;display:flex;justify-content:center}
.cw{width:100%;max-width:640px}
.cs{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;overflow:hidden}
.csh{padding:11px 15px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:500;color:var(--text2);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between}
.crow{display:flex;align-items:center;padding:9px 15px;border-bottom:1px solid var(--border);gap:9px}
.crow:last-child{border-bottom:none}
.cdot{width:16px;height:16px;border-radius:3px;flex-shrink:0;border:1px solid rgba(0,0,0,.12);cursor:pointer;transition:transform .1s}
.cdot:hover{transform:scale(1.15)}
.cni{flex:1;border:1px solid transparent;border-radius:4px;padding:4px 7px;font-size:13px;font-family:'DM Sans',sans-serif;background:transparent;color:var(--text);outline:none}
.cni:focus{border-color:var(--blue);background:var(--surface)}
.stog{display:flex;border:1px solid var(--border2);border-radius:4px;overflow:hidden}
.sb2{padding:4px 11px;font-size:11px;cursor:pointer;border:none;background:none;color:var(--text2);font-family:'DM Sans',sans-serif}
.sb2.active{background:var(--text);color:#fff}

/* history tab */
#view-hist{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:0}
.hist-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.hist-table{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;flex:1}
.hist-table table{width:100%;border-collapse:collapse;font-size:13px}
.hist-table th{padding:9px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:500;color:var(--text2);text-align:left;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.hist-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:var(--bg)}
.hact{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;font-family:'DM Mono',monospace}
.hact.added{background:var(--green-bg);color:var(--green)}
.hact.deleted{background:var(--red-bg);color:var(--red)}
.hact.edited{background:var(--blue-bg);color:var(--blue)}
.hact.copied{background:var(--amber-bg);color:var(--amber)}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">◆ FINTRACK</span>
  <div class="sep"></div>
  <div class="mnav">
    <button onclick="changeMonth(-1)">‹</button>
    <span class="mlbl" id="mlbl"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="sep"></div>
  <span style="font-size:12px;color:var(--text3)" id="ecnt"></span>
  <div class="ta">
    <button class="btn btn-sm btn-ghost" id="undoBtn" onclick="undo()" title="Undo (Ctrl+Z)" disabled>↩ Undo</button>
    <button class="btn btn-sm btn-ghost" id="redoBtn" onclick="redo()" title="Redo (Ctrl+Shift+Z)" disabled>↪ Redo</button>
    <div class="sep"></div>
    <button class="btn btn-sm btn-ghost" onclick="exportCSV()">CSV</button>
    <button class="btn btn-sm btn-ghost" onclick="exportXLSX()">XLSX</button>
    <button class="btn btn-sm btn-ghost" onclick="exportJSON()">JSON</button>
    <button class="btn btn-sm btn-p" onclick="switchTab('entry');clearEF()">+ Add entry</button>
  </div>
</div>

<div class="tabbar">
  <button class="tab active" id="tab-master" onclick="switchTab('master')">Master table</button>
  <button class="tab" id="tab-entry" onclick="switchTab('entry');clearEF()">Add entry</button>
  <button class="tab" id="tab-split" onclick="switchTab('split')">Month-end split</button>
  <button class="tab" id="tab-cats" onclick="switchTab('cats')">Categories</button>
  <button class="tab" id="tab-hist" onclick="switchTab('hist')">History</button>
</div>

<div class="main">

  <!-- MASTER TABLE -->
  <div id="view-master" style="display:flex;flex:1;flex-direction:column;overflow:hidden">
    <div class="sbar" id="sbar"></div>
    <div style="display:flex;flex:1;overflow:hidden">
      <div class="sheet-wrap">
        <table class="stbl" id="stbl"></table>
      </div>
      <div class="sidebar hidden" id="sidebar">
        <div class="sbh"><h3 id="sbTitle">Detail</h3><button class="btn btn-sm btn-ghost" onclick="closeSB()">✕</button></div>
        <div class="sbb" id="sbBody"></div>
        <div class="sbf" id="sbFoot"></div>
      </div>
    </div>
  </div>

  <!-- ADD ENTRY -->
  <div id="view-entry" style="display:none">
    <div class="efw">
      <h2>New entry</h2>
      <div class="fg"><label class="fl">Type</label>
        <div class="tgg">
          <button class="to active spend" id="ef-spend" onclick="efType('spend')">Spend</button>
          <button class="to" id="ef-income" onclick="efType('income')">Income</button>
        </div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Category</label><select class="fc" id="ef-cat"></select></div>
        <div class="fg"><label class="fl">Amount (£)</label><input class="fc" type="number" id="ef-amt" placeholder="0.00" min="0" step="0.01"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Date</label><input class="fc" type="date" id="ef-date"></div>
        <div class="fg"><label class="fl">Status</label><select class="fc" id="ef-status"><option value="confirmed">Confirmed</option><option value="forecast">Forecast</option></select></div>
      </div>
      <div class="fg"><label class="fl">Note (optional)</label><textarea class="fc" id="ef-note" placeholder="e.g. Tesco weekly shop"></textarea></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="switchTab('master')">Cancel</button>
        <button class="btn btn-p" onclick="submitEF()">Add entry</button>
      </div>
    </div>
  </div>

  <!-- SPLIT -->

function saveE(){localStorage.setItem('ft_e5',JSON.stringify(entries));}
function saveC(){localStorage.setItem('ft_cats',JSON.stringify(cats));}
function saveCS(){localStorage.setItem('ft_cs5',JSON.stringify(cellStyles));}
function saveHist(){localStorage.setItem('ft_hist',JSON.stringify(history));}
function fmt(n){return'£'+Number(n).toFixed(2);}
function fmtR(n){return'£'+Math.round(n);}
function gc(name){return cats.find(c=>c.name===name);}
function escQ(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function fmtDate(d){const x=new Date(d+'T00:00:00');return x.getDate()+' '+MONTHS[x.getMonth()].slice(0,3);}
function isWeekStart(d){return new Date(cy,cm,d).getDay()===1;}
function isToday(d){return cy===todayYear&&cm===todayMonth&&d===todayDay;}

function me(){return entries.filter(e=>{const d=new Date(e.date+'T00:00:00');return d.getMonth()===cm&&d.getFullYear()===cy;});}

// ── Undo / Redo ──
function snapshot(){return JSON.parse(JSON.stringify(entries));}
function pushUndo(){undoStack.push(snapshot());if(undoStack.length>50)undoStack.shift();redoStack=[];updateUndoUI();}
function undo(){
  if(!undoStack.length)return;
  redoStack.push(snapshot());
  entries=undoStack.pop();
  saveE();renderAll();updateUndoUI();
}
function redo(){
  if(!redoStack.length)return;
  undoStack.push(snapshot());
  entries=redoStack.pop();
  saveE();renderAll();updateUndoUI();
}
function updateUndoUI(){
  document.getElementById('undoBtn').disabled=!undoStack.length;
  document.getElementById('redoBtn').disabled=!redoStack.length;
}

// ── History log ──
function logAction(action, entry, extra=''){
  history.unshift({
    ts:new Date().toISOString(),
    action, // 'added','edited','deleted','copied'
    category:entry.category||'',
    amount:entry.amount||0,
    note:entry.note||'',
    month:MONTHS[cm]+' '+cy,
    extra
  });
  if(history.length>500)history.pop();
  saveHist();
}
function clearHist(){history=[];saveHist();renderHist();}

// ── Navigation ──
function changeMonth(dir){
  cm+=dir;if(cm>11){cm=0;cy++;}if(cm<0){cm=11;cy--;}
  clearSel();renderAll();
}
function switchTab(n){
  activeTab=n;
  ['master','entry','split','cats','hist'].forEach(t=>{
    document.getElementById('view-'+t).style.display=t===n?'flex':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===n);
  });
  if(n==='split')renderSplit();
  if(n==='cats')renderCats();
  if(n==='master')renderAll();
  if(n==='hist')renderHist();
}

// ── Render ──
function renderAll(){
  document.getElementById('mlbl').textContent=MONTHS[cm].toUpperCase()+' '+cy;
  renderStats();renderSheet();
  document.getElementById('ecnt').textContent=me().length+' entries';
}

function renderStats(){
  const me_=me();
  const days=new Date(cy,cm+1,0).getDate();
  const upTo=isToday(1)?todayDay:days; // if viewing current month use today, else full month
  const isCurMonth=cy===todayYear&&cm===todayMonth;
  const upToDay=isCurMonth?todayDay:days;
  let todayDisp=0;
  for(let d=1;d<=upToDay;d++){
    const inc=me_.filter(e=>e.type==='income'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    const sp=me_.filter(e=>e.type==='spend'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    todayDisp+=inc-sp;
  }
  let endDisp=0;
  for(let d=1;d<=days;d++){
    const inc=me_.filter(e=>e.type==='income'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    const sp=me_.filter(e=>e.type==='spend'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    endDisp+=inc-sp;
  }
  const peSp=me_.filter(e=>e.type==='spend'&&gc(e.category)?.scope==='personal').reduce((s,e)=>s+e.amount,0);
  const todayLbl=isCurMonth?"Today's disposable":"Month disposable";
  document.getElementById('sbar').innerHTML=`
    <div class="si"><div class="sl">${todayLbl}</div><div class="sv ${todayDisp>=0?'pos':'neg'}">${fmtR(todayDisp)}</div></div>
    <div class="si"><div class="sl">Personal spend</div><div class="sv" style="color:var(--amber)">${fmt(peSp)}</div></div>
    <div class="si"><div class="sl">End of month disposable</div><div class="sv ${endDisp>=0?'pos':'neg'}">${fmtR(endDisp)}</div></div>`;
}

function renderSheet(){
  const me_=me();
  const days=new Date(cy,cm+1,0).getDate();
  const DOW=['Su','Mo','Tu','We','Th','Fr','Sa'];

  // build header
  let hdr='<thead><tr><th class="ch">Category</th><th class="th" style="text-align:right">Total</th>';
  for(let d=1;d<=days;d++){
    const ms=d===1;
    const ws=!ms&&isWeekStart(d);
    const tod=isToday(d);
    const cls=(ms?'dh month-start':ws?'dh week-start':'dh')+(tod?' today-col':'');
    const dow=DOW[new Date(cy,cm,d).getDay()];
    hdr+=`<th class="${cls}"><span class="daynum">${d}</span><span class="dayname">${dow}</span></th>`;
  }
  hdr+='</tr></thead>';

  let body='<tbody>';
  const isEmpty=me_.length===0;
  if(isEmpty){
    body+=`<tr><td colspan="${days+2}" style="padding:20px;text-align:center;color:var(--text2)">No entries for this month. <button class="btn btn-sm btn-p" style="margin-left:10px" onclick="copyPrevMonth()">Copy from previous month</button></td></tr>`;
  }

  cats.forEach(cat=>{
    const ce=me_.filter(e=>e.category===cat.name);
    const total=ce.reduce((s,e)=>s+e.amount,0);
    const isInc=cat.type==='income';
    const isPers=cat.scope==='personal';
    const rowCls=isInc?'ri':isPers?'rp':'rs';
    const defBg=isInc?'#f6fdf8':isPers?'#fffbf0':'#ffffff';
    const bg=cat.colour||defBg;
    const amtCol=isInc?'var(--green)':isPers?'var(--amber)':'var(--red)';

    body+=`<tr class="${rowCls}" oncontextmenu="openCatCtx(event,'${escQ(cat.name)}')">`;
    body+=`<td class="cc" style="background:${bg}" onclick="openCatSB('${escQ(cat.name)}')"><span class="spip ${cat.scope}"></span>${cat.name}</td>`;
    body+=`<td class="tc" style="background:${bg}"><span style="color:${amtCol}">${fmtR(total)}</span></td>`;

    for(let d=1;d<=days;d++){
      const de=ce.filter(e=>new Date(e.date+'T00:00:00').getDate()===d);
      const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const ms=d===1,ws=!ms&&isWeekStart(d),tod=isToday(d);
      const dcls='dc'+(ms?' month-start':ws?' week-start':'')+(tod?' today-col':'');
      body+=`<td class="${dcls}" style="background:${bg}" ondblclick="openAddModal('${escQ(cat.name)}','${ds}')" oncontextmenu="openCellCtx(event,'${escQ(cat.name)}',${d})">`;
      if(de.length){
        body+='<div class="cstack">';
        de.forEach(tx=>{
          const cs=cellStyles[tx.id]||{};
          const isSel=selEntries.has(tx.id);
          const divSt=cs.bgColor?`background:${cs.bgColor}`:'';
          const spSt=buildSpanStyle(cs,tx.type);
          body+=`<div class="ce${isSel?' sel':''}" style="${divSt}" onclick="handleCellClick(event,${tx.id},'${escQ(cat.name)}','${ds}')" oncontextmenu="openCellCtx(event,'${escQ(cat.name)}',${d},${tx.id})">
            <span class="ca ${tx.status}" style="${spSt}">${'£'}${tx.amount%1===0?tx.amount:tx.amount.toFixed(2)}</span>
            ${tx.note?`<span class="cn" title="${tx.note}">${tx.note}</span>`:''}
          </div>`;
        });
        body+='</div>';
      } else {
        body+=`<div class="cadd" onclick="openAddModal('${escQ(cat.name)}','${ds}')">+</div>`;
      }
      body+='</td>';
    }
    body+='</tr>';
  });

  // total income row
  const tInc=me_.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  body+=`<tr class="rt"><td class="cc">Total income</td><td class="tc" style="color:var(--green)">${fmtR(tInc)}</td>`;
  for(let d=1;d<=days;d++){
    const s=me_.filter(e=>e.type==='income'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    const ms=d===1,ws=!ms&&isWeekStart(d),tod=isToday(d);
    body+=`<td class="dc${ms?' month-start':ws?' week-start':''}${tod?' today-col':''}" style="text-align:center;vertical-align:middle;font-size:11px;color:var(--green);font-weight:500;padding:0 2px">${s||''}</td>`;
  }
  body+='</tr>';

  // total spend row
  const tSp=me_.filter(e=>e.type==='spend').reduce((s,e)=>s+e.amount,0);
  body+=`<tr class="rt"><td class="cc">Total spend</td><td class="tc" style="color:var(--red)">${fmtR(tSp)}</td>`;
  for(let d=1;d<=days;d++){
    const s=me_.filter(e=>e.type==='spend'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    const ms=d===1,ws=!ms&&isWeekStart(d),tod=isToday(d);
    body+=`<td class="dc${ms?' month-start':ws?' week-start':''}${tod?' today-col':''}" style="text-align:center;vertical-align:middle;font-size:11px;color:var(--red);font-weight:500;padding:0 2px">${s||''}</td>`;
  }
  body+='</tr>';

  // bottom day row (repeated, above disposable)
  body+=`<tr class="rdayrow"><td class="cc" style="font-size:12px;font-weight:600">Day</td><td class="tc"></td>`;
  for(let d=1;d<=days;d++){
    const ms=d===1,ws=!ms&&isWeekStart(d),tod=isToday(d);
    const dow=DOW[new Date(cy,cm,d).getDay()];
    body+=`<td class="dc${ms?' month-start':ws?' week-start':''}${tod?' today-col':''}" style="text-align:center;vertical-align:middle;padding:2px 0">
      <span class="daynum" style="color:${tod?'var(--today)':'var(--text2)'}">${d}</span>
      <span class="dayname" style="color:${tod?'var(--blue)':'var(--text3)'}">${dow}</span>
    </td>`;
  }
  body+='</tr>';

  // disposable row
  body+=`<tr class="rb"><td class="cc">Disposable</td><td class="tc"></td>`;
  let run=0;
  for(let d=1;d<=days;d++){
    const inc=me_.filter(e=>e.type==='income'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    const sp=me_.filter(e=>e.type==='spend'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    run+=inc-sp;
    const hasAct=me_.some(e=>new Date(e.date+'T00:00:00').getDate()===d);
    const ms=d===1,ws=!ms&&isWeekStart(d),tod=isToday(d);
    body+=`<td class="dc${ms?' month-start':ws?' week-start':''}${tod?' today-col':''}" style="text-align:center;vertical-align:middle;font-size:11px;color:var(--blue);font-weight:500;padding:0 2px">${(hasAct||run!==0)?Math.round(run):''}</td>`;
  }
  body+='</tr></tbody>';
  document.getElementById('stbl').innerHTML=hdr+body;
}

// styles split: div gets only bgColor, span gets font/colour
function buildSpanStyle(cs,type){
  const fw=cs.bold?'700':(cs.fontSize?'400':'500');
  const fi=cs.italic?'italic':'normal';
  const fs=(cs.fontSize||12)+'px';
  const col=cs.color||(type==='income'?'var(--green)':'var(--red)');
  return `font-weight:${fw};font-style:${fi};font-size:${fs};color:${col}`;
}

// ── Selection ──
function handleCellClick(ev,id,cat,date){
  if(ev.ctrlKey||ev.metaKey){
    ev.stopPropagation();
    if(selEntries.has(id))selEntries.delete(id);else selEntries.add(id);
    renderSheet();updateSelBar();
  } else if(ev.shiftKey){
    ev.stopPropagation();
    selEntries.add(id);
    renderSheet();updateSelBar();
  } else {
    openCellModal(id,cat,date);
  }
}
function updateSelBar(){
  const sb=document.getElementById('selbar');
  if(!selEntries.size){sb.classList.remove('show');return;}
  const vals=Array.from(selEntries).map(id=>entries.find(e=>e.id===id)?.amount||0);
  const sum=vals.reduce((a,b)=>a+b,0);
  const avg=vals.length?sum/vals.length:0;
  sb.textContent=`${vals.length} selected  ·  Sum: £${sum.toFixed(2)}  ·  Avg: £${avg.toFixed(2)}`;
  sb.classList.add('show');
}
function clearSel(){selEntries.clear();updateSelBar();}
document.addEventListener('click',e=>{
  if(!e.ctrlKey&&!e.metaKey&&!e.shiftKey){
    if(!e.target.closest('.ce')&&!e.target.closest('.ctx')){clearSel();if(selEntries.size)renderSheet();}

// ── Context menus ──
function openCatCtx(ev,catName){
  ev.preventDefault();ev.stopPropagation();
  const m=document.getElementById('ctx');
  m.classList.remove('hidden');
  m.style.left=Math.min(ev.clientX,window.innerWidth-215)+'px';
  m.style.top=Math.min(ev.clientY,window.innerHeight-340)+'px';
  m.innerHTML=`
    <div class="cxi" onclick="closeCtx();openCatSB('${escQ(catName)}')">📋 View entries</div>
    <div class="cxi" onclick="closeCtx();moveCat('${escQ(catName)}',-1)">↑ Move up</div>
    <div class="cxi" onclick="closeCtx();moveCat('${escQ(catName)}',1)">↓ Move down</div>
    <div class="cxsep"></div>
    <div class="cxi" onclick="closeCtx();switchTab('cats')">✏️ Manage categories</div>
    <div class="cxsep"></div>
    <div class="cxlbl">Row colour</div>
    <div class="cgrid">${BGCOLS.map(c=>`<div class="csw" style="background:${c}" onclick="setCatCol('${escQ(catName)}','${c}');closeCtx()"></div>`).join('')}</div>
    <div class="cxsep"></div>
    <div class="cxi" onclick="setCatCol('${escQ(catName)}',null);closeCtx()">✕ Clear colour</div>`;
}

function openCellCtx(ev,catName,day,txId){
  ev.preventDefault();ev.stopPropagation();
  const m=document.getElementById('ctx');
  m.classList.remove('hidden');
  m.style.left=Math.min(ev.clientX,window.innerWidth-230)+'px';
  m.style.top=Math.min(ev.clientY,window.innerHeight-400)+'px';
  const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

  if(txId){
    const cs=cellStyles[txId]||{};
    m.innerHTML=`
      <div class="cxlbl">Text style</div>
      <div class="ftbar">
        <button class="ftbtn${cs.bold?' on':''}" onclick="event.stopPropagation();toggleCS(${txId},'bold')"><b>B</b></button>
        <button class="ftbtn${cs.italic?' on':''}" onclick="event.stopPropagation();toggleCS(${txId},'italic')"><i>I</i></button>
        <input class="ftsz" type="number" min="8" max="28" value="${cs.fontSize||12}" onclick="event.stopPropagation()" onchange="event.stopPropagation();setCS(${txId},'fontSize',Math.max(8,Math.min(28,parseInt(this.value)||12)))" title="Font size (px)">
      </div>
      <div class="cxlbl">Text colour</div>
      <div class="ftcolgrid">${TXTCOLS.map(c=>`<div class="ftcsw" style="background:${c}" onclick="event.stopPropagation();setCS(${txId},'color','${c}')"></div>`).join('')}</div>
      <div class="cxlbl">Cell fill colour</div>
      <div class="cgrid">${BGCOLS.map(c=>`<div class="csw" style="background:${c}" onclick="event.stopPropagation();setCS(${txId},'bgColor','${c}')"></div>`).join('')}</div>
      <div class="cxsep"></div>
      <div class="cxi" onclick="event.stopPropagation();clearCS(${txId})">✕ Clear formatting</div>
      <div class="cxsep"></div>
      <div class="cxi" onclick="closeCtx();openCellModal(${txId},'${escQ(catName)}','${ds}')">✏️ Edit entry</div>
      <div class="cxi" onclick="closeCtx();openAddModal('${escQ(catName)}','${ds}')">＋ Add another here</div>`;
  } else {
    m.innerHTML=`
      <div class="cxi" onclick="closeCtx();openAddModal('${escQ(catName)}','${ds}')">＋ Add entry here</div>`;
  }
}

function toggleCS(id,prop){
  if(!cellStyles[id])cellStyles[id]={};
  cellStyles[id][prop]=!cellStyles[id][prop];
  saveCS();renderSheet();
}
function setCS(id,prop,val){
  if(!cellStyles[id])cellStyles[id]={};
  cellStyles[id][prop]=val;
  saveCS();renderSheet();
}
function clearCS(id){delete cellStyles[id];saveCS();closeCtx();renderSheet();}

function closeCtx(){document.getElementById('ctx').classList.add('hidden');}
document.addEventListener('click',e=>{if(!e.target.closest('.ctx'))closeCtx();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeSB();closeCtx();clearSel();}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
});

function moveCat(catName,dir){
  const idx=cats.findIndex(c=>c.name===catName);if(idx<0)return;
  const ni=idx+dir;if(ni<0||ni>=cats.length)return;
  [cats[idx],cats[ni]]=[cats[ni],cats[idx]];
  saveC();renderSheet();
}
function setCatCol(catName,colour){
  const c=gc(catName);if(c){c.colour=colour;saveC();renderSheet();}
}

// ── Modals ──
function openCellModal(id,cat,date){
  const e=entries.find(x=>x.id===id);if(!e)return;
  document.getElementById('m-title').textContent=e.category+' — '+fmtDate(e.date);
  document.getElementById('m-body').innerHTML=buildForm(e)+`<div class="dcbox" id="dcb">Are you sure? This cannot be undone.<div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-sm btn-danger" onclick="confirmDel(${id})">Yes, delete</button><button class="btn btn-sm" onclick="document.getElementById('dcb').classList.remove('show')">Cancel</button></div></div>`;
  document.getElementById('m-foot').innerHTML=`
    <button class="btn btn-sm" style="color:var(--red);border-color:#fca5a5" onclick="document.getElementById('dcb').classList.add('show')">Delete</button>
    <div style="flex:1"></div>
    <button class="btn btn-sm btn-ghost" onclick="closeModal();openAddModal('${escQ(cat)}','${date}')">+ Add another</button>
    <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
    <button class="btn btn-sm btn-p" onclick="saveEntry(${id})">Save</button>`;
  document.getElementById('modal').classList.remove('hidden');
}

function openAddModal(cat,date){
  const catObj=gc(cat);
  document.getElementById('m-title').textContent='Add — '+cat;
  document.getElementById('m-body').innerHTML=buildForm({category:cat,date:date||'',type:catObj?.type||'spend',amount:'',status:'confirmed',note:''});
  document.getElementById('m-foot').innerHTML=`<button class="btn btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-sm btn-p" onclick="saveEntry(null)">Add entry</button>`;
  document.getElementById('modal').classList.remove('hidden');
}

function buildForm(e){
  const opts=cats.map(c=>`<option value="${c.name}" ${c.name===e.category?'selected':''}>${c.name}</option>`).join('');
  return`<div class="fg"><label class="fl">Category</label><select class="fc" id="m-cat">${opts}</select></div>
  <div class="frow">
    <div class="fg"><label class="fl">Amount (£)</label><input class="fc" type="number" id="m-amt" value="${e.amount||''}" step="0.01" min="0" placeholder="0.00"></div>
    <div class="fg"><label class="fl">Date</label><input class="fc" type="date" id="m-date" value="${e.date||''}"></div>
  </div>
  <div class="frow">
    <div class="fg"><label class="fl">Status</label><select class="fc" id="m-stat"><option value="confirmed" ${e.status==='confirmed'?'selected':''}>Confirmed</option><option value="forecast" ${e.status==='forecast'?'selected':''}>Forecast</option></select></div>
    <div class="fg"><label class="fl">Note</label><input class="fc" type="text" id="m-note" value="${e.note||''}" placeholder="e.g. Tesco"></div>
  </div>`;
}

function saveEntry(id){
  const cat=document.getElementById('m-cat').value;
  const amt=parseFloat(document.getElementById('m-amt').value);
  const date=document.getElementById('m-date').value;
  const status=document.getElementById('m-stat').value;
  const note=document.getElementById('m-note').value.trim();
  if(!amt||amt<=0||!date){alert('Please fill in amount and date.');return;}
  const catObj=gc(cat);
  const type=catObj?catObj.type:'spend';
  pushUndo();
  if(id){
    const e=entries.find(x=>x.id===id);
    const old={...e};
    Object.assign(e,{category:cat,amount:amt,date,status,note,type});
    logAction('edited',e,`was £${old.amount}`);
  } else {
    const ne={id:Date.now(),type,category:cat,amount:amt,date,status,note};
    entries.push(ne);
    logAction('added',ne);
  }
  saveE();closeModal();renderAll();
  if(!document.getElementById('sidebar').classList.contains('hidden'))openCatSB(document.getElementById('sbTitle').textContent);
}

function confirmDel(id){
  const e=entries.find(x=>x.id===id);
  pushUndo();
  logAction('deleted',e||{category:'?',amount:0});
  entries=entries.filter(x=>x.id!==id);
  delete cellStyles[id];
  saveE();saveCS();closeModal();renderAll();closeSB();
}
function closeModal(){document.getElementById('modal').classList.add('hidden');}

// ── Sidebar ──
function openCatSB(catName){
  const me_=me().filter(e=>e.category===catName).sort((a,b)=>a.date.localeCompare(b.date));
  const cat=gc(catName);
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('sbTitle').textContent=catName;
  let html='<div>';
  if(!me_.length)html+='<p style="color:var(--text3);font-size:13px;padding:4px 0">No entries this month.</p>';
  me_.forEach(e=>{
    const d=new Date(e.date+'T00:00:00');
    html+=`<div class="ecard" onclick="openCellModal(${e.id},'${escQ(catName)}','${e.date}')">
      <div class="ecmeta">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-weight:500;font-size:12px">${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}</span>
          <span class="ebadge ${e.status==='confirmed'?'bc':'bfo'}">${e.status}</span>
          ${cat?.scope==='personal'?'<span class="ebadge bp">personal</span>':''}
        </div>
        ${e.note?`<div class="ecnote">${e.note}</div>`:''}
      </div>
      <div class="ecamt ${e.type}">${e.type==='income'?'+':'-'}${fmt(e.amount)}</div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('sbBody').innerHTML=html;
  document.getElementById('sbFoot').innerHTML=`<button class="btn btn-sm btn-p" onclick="openAddModal('${escQ(catName)}','')">+ Add entry</button>`;
}
function closeSB(){document.getElementById('sidebar').classList.add('hidden');}

// ── Copy previous month ──
function copyPrevMonth(){
  let pm=cm-1,py=cy;if(pm<0){pm=11;py--;}
  const prev=entries.filter(e=>{const d=new Date(e.date+'T00:00:00');return d.getMonth()===pm&&d.getFullYear()===py;});
  if(!prev.length){alert('No entries found in the previous month.');return;}
  pushUndo();
  const added=prev.map(e=>({...e,id:Date.now()+Math.random(),date:`${cy}-${String(cm+1).padStart(2,'0')}-${e.date.slice(8,10)}`,status:'forecast'}));
  entries.push(...added);
  logAction('copied',{category:'all categories',amount:added.length,note:`${added.length} entries from ${MONTHS[pm]} ${py}`});
  saveE();renderAll();
}

// ── Categories ──
function renderCats(){
  const wrap=document.getElementById('cw');let html='';
  ['income','spend'].forEach(type=>{
    const list=cats.filter(c=>c.type===type);
    html+=`<div class="cs"><div class="csh"><span>${type==='income'?'Income categories':'Spend categories'}</span><button class="btn btn-sm" onclick="addCat('${type}')">+ Add</button></div>`;
    list.forEach(c=>{
      html+=`<div class="crow">
        <div class="cdot" style="background:${c.colour||'var(--border2)'}" onclick="openColPicker('${c.id}')" title="Set colour"></div>
        <input class="cni" value="${c.name.replace(/"/g,'&quot;')}" onblur="renameCat('${c.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
        ${type==='spend'?`<div class="stog"><button class="sb2 ${c.scope==='shared'?'active':''}" onclick="setScope('${c.id}','shared')">Shared</button><button class="sb2 ${c.scope==='personal'?'active':''}" onclick="setScope('${c.id}','personal')">Personal</button></div>`:'<span style="width:120px;font-size:11px;color:var(--text3);text-align:center">income</span>'}
        <button class="btn btn-sm btn-ghost" style="color:var(--red);padding:4px 8px" onclick="deleteCat('${c.id}')">✕</button>
      </div>`;
    });
    html+='</div>';
  });
  wrap.innerHTML=html;
}
function addCat(type){
  const id='c'+Date.now();cats.push({id,name:'New category',type,scope:'shared',colour:null});
  saveC();renderCats();updateEFCats();
  setTimeout(()=>{const ii=document.querySelectorAll('.cni');if(ii.length)ii[ii.length-1].select();},60);
}
function renameCat(id,n){
  n=n.trim();if(!n)return;
  const c=cats.find(x=>x.id===id);if(!c||c.name===n)return;
  const old=c.name;c.name=n;
  entries.forEach(e=>{if(e.category===old)e.category=n;});
  saveC();saveE();renderCats();updateEFCats();if(activeTab==='master')renderAll();
}
function setScope(id,scope){
  const c=cats.find(x=>x.id===id);if(c){c.scope=scope;saveC();renderCats();if(activeTab==='master')renderAll();}
}
function deleteCat(id){
  const c=cats.find(x=>x.id===id);if(!c)return;
  if(entries.some(e=>e.category===c.name)){alert(`"${c.name}" has entries. Remove them first.`);return;}
  cats=cats.filter(x=>x.id!==id);saveC();renderCats();updateEFCats();
}
function openColPicker(catId){
  document.getElementById('m-title').textContent='Row colour';
  document.getElementById('m-body').innerHTML=`<div class="cgrid" style="grid-template-columns:repeat(8,28px);gap:6px;padding:4px 0">${BGCOLS.map(c=>`<div class="csw" style="background:${c};width:28px;height:28px;border-radius:5px" onclick="applyCol('${catId}','${c}')"></div>`).join('')}</div>`;
  document.getElementById('m-foot').innerHTML=`<button class="btn btn-sm" onclick="applyCol('${catId}',null)">Clear</button><div style="flex:1"></div><button class="btn btn-sm" onclick="closeModal()">Cancel</button>`;
  document.getElementById('modal').classList.remove('hidden');
}
function applyCol(catId,colour){
  const c=cats.find(x=>x.id===catId);if(c){c.colour=colour;saveC();}
  closeModal();if(activeTab==='cats')renderCats();if(activeTab==='master')renderSheet();
}

// ── History ──
function renderHist(){
  const filter=document.getElementById('hist-filter').value;
  const rows=filter?history.filter(h=>h.action===filter):history;
  if(!rows.length){
    document.getElementById('histBody').innerHTML='<p style="padding:20px;color:var(--text3);font-size:13px;text-align:center">No history yet.</p>';
    return;
  }
  let html='<table><thead><tr><th>Date &amp; time</th><th>Action</th><th>Category</th><th>Amount</th><th>Note</th><th>Month</th></tr></thead><tbody>';
  rows.forEach(h=>{
    const d=new Date(h.ts);
    const ts=d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    html+=`<tr>
      <td style="white-space:nowrap;color:var(--text2);font-size:12px">${ts}</td>
      <td><span class="hact ${h.action}">${h.action}</span></td>
      <td style="font-weight:500">${h.category}</td>
      <td style="font-family:'DM Mono',monospace">${h.amount?fmt(h.amount):''}</td>
      <td style="color:var(--text2);font-size:12px;font-style:italic">${h.note||h.extra||''}</td>
      <td style="color:var(--text2);font-size:12px">${h.month}</td>
    </tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('histBody').innerHTML=html;
}

// ── Add entry form ──
function efType(t){
  curEFType=t;
  document.getElementById('ef-spend').className='to'+(t==='spend'?' active spend':'');
  document.getElementById('ef-income').className='to'+(t==='income'?' active income':'');
  updateEFCats();
}
function updateEFCats(){
  const s=document.getElementById('ef-cat');if(!s)return;s.innerHTML='';
  cats.filter(c=>c.type===curEFType).forEach(c=>{const o=document.createElement('option');o.value=c.name;o.textContent=c.name;s.appendChild(o);});
  if(curEFType==='spend'){const fs=[...s.options].find(o=>o.value==='Food & shop');if(fs)s.value='Food & shop';}
}
function clearEF(){
  efType('spend');
  document.getElementById('ef-amt').value='';
  document.getElementById('ef-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('ef-status').value='confirmed';
  document.getElementById('ef-note').value='';
}
function submitEF(){
  const cat=document.getElementById('ef-cat').value;
  const amt=parseFloat(document.getElementById('ef-amt').value);
  const date=document.getElementById('ef-date').value;
  if(!amt||amt<=0||!date){alert('Please fill in amount and date.');return;}
  const catObj=gc(cat);
  const ne={id:Date.now(),type:catObj?catObj.type:curEFType,category:cat,amount:amt,date,status:document.getElementById('ef-status').value,note:document.getElementById('ef-note').value.trim()};
  pushUndo();
  entries.push(ne);
  logAction('added',ne);
  saveE();clearEF();switchTab('master');
}

// ── Split ──
function renderSplit(){
  const me_=me();
  const sal=parseFloat(document.getElementById('sp-sal').value)||0;
  const loan=parseFloat(document.getElementById('sp-loan').value)||0;
  const oth=parseFloat(document.getElementById('sp-oth').value)||0;
  const elDisp=sal-loan-oth;
  const myInc=me_.filter(e=>e.type==='income'&&e.category!=='From Elena').reduce((s,e)=>s+e.amount,0);
  const shSp=me_.filter(e=>e.type==='spend'&&gc(e.category)?.scope!=='personal').reduce((s,e)=>s+e.amount,0);
  const peSp=me_.filter(e=>e.type==='spend'&&gc(e.category)?.scope==='personal').reduce((s,e)=>s+e.amount,0);
  const myRem=myInc-shSp-peSp;
  const target=(myRem+elDisp)/2;
  const owes=Math.round(elDisp-target);
  const myF=Math.round(myRem+owes);
  const elF=Math.round(elDisp-owes);
  document.getElementById('sp-my').innerHTML=`
    <div class="srow"><span>Income (excl. Elena)</span><span class="sval pos">${fmt(myInc)}</span></div>
    <div class="srow"><span>Shared spend</span><span class="sval neg">-${fmt(shSp)}</span></div>
    ${peSp?`<div class="srow"><span>Personal spend</span><span class="sval" style="color:var(--amber)">-${fmt(peSp)}</span></div>`:''}
    <div class="srow tot"><span>Balance before transfer</span><span class="sval">${fmt(myRem)}</span></div>`;
  document.getElementById('sp-el').innerHTML=`
    <div class="srow"><span>Salary</span><span class="sval pos">${fmt(sal)}</span></div>
    <div class="srow"><span>Personal loan</span><span class="sval neg">-${fmt(loan)}</span></div>
    ${oth?`<div class="srow"><span>Other deductions</span><span class="sval neg">-${fmt(oth)}</span></div>`:''}
    <div class="srow tot"><span>Disposable</span><span class="sval">${fmt(elDisp)}</span></div>`;
  document.getElementById('sp-res').textContent=fmt(owes);
  document.getElementById('sp-sav').innerHTML=`
    <div class="srsi"><div class="srsil">Your savings</div><div class="srsiv">${fmt(myF)}</div></div>
    <div class="srsi"><div class="srsil">Elena's savings</div><div class="srsiv">${fmt(elF)}</div></div>`;
}

// ── Exports ──
function exportJSON(){
  const b=new Blob([JSON.stringify({entries,cats},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`fintrack-${MONTHS[cm].toLowerCase()}-${cy}.json`;a.click();
}
function exportCSV(){
  const me_=me(),days=new Date(cy,cm+1,0).getDate();
  const rows=[['Category','Total',...Array.from({length:days},(_,i)=>i+1)]];
  cats.forEach(cat=>{
    const ce=me_.filter(e=>e.category===cat.name);
    const total=ce.reduce((s,e)=>s+e.amount,0);
    rows.push([cat.name,total,...Array.from({length:days},(_,i)=>ce.filter(e=>new Date(e.date+'T00:00:00').getDate()===i+1).reduce((s,e)=>s+e.amount,0)||'')]);
  });
  let run=0;const disp=['Disposable',''];
  for(let d=1;d<=days;d++){
    const inc=me_.filter(e=>e.type==='income'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    const sp=me_.filter(e=>e.type==='spend'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    run+=inc-sp;disp.push(me_.some(e=>new Date(e.date+'T00:00:00').getDate()===d)?Math.round(run):'');
  }
  rows.push(disp);
  const csv=rows.map(r=>r.map(v=>JSON.stringify(v??'')).join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`fintrack-${MONTHS[cm].toLowerCase()}-${cy}.csv`;a.click();
}
function exportXLSX(){
  const me_=me(),days=new Date(cy,cm+1,0).getDate();
  const aoa=[['Category','Total',...Array.from({length:days},(_,i)=>i+1)]];
  cats.forEach(cat=>{
    const ce=me_.filter(e=>e.category===cat.name);
    aoa.push([cat.name,ce.reduce((s,e)=>s+e.amount,0)||null,...Array.from({length:days},(_,i)=>ce.filter(e=>new Date(e.date+'T00:00:00').getDate()===i+1).reduce((s,e)=>s+e.amount,0)||null)]);
  });
  let run=0;const disp=['Disposable',null];
  for(let d=1;d<=days;d++){
    const inc=me_.filter(e=>e.type==='income'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    const sp=me_.filter(e=>e.type==='spend'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    run+=inc-sp;disp.push(me_.some(e=>new Date(e.date+'T00:00:00').getDate()===d)?Math.round(run):null);
  }
  aoa.push(disp);
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,MONTHS[cm].slice(0,3)+' '+cy);
  XLSX.writeFile(wb,`fintrack-${MONTHS[cm].toLowerCase()}-${cy}.xlsx`);
}

// ── Init ──
updateEFCats();
document.getElementById('ef-date').value=new Date().toISOString().slice(0,10);
updateUndoUI();
renderAll();
</script>
