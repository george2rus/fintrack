<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#f9f8f5;--border:#e2e0d8;--border2:#ccc9be;
  --text:#1a1916;--text2:#6b6960;--text3:#9e9b92;
  --green:#2d6a4f;--green-bg:#d8f3dc;--red:#9b2226;--red-bg:#fde8e8;
  --blue:#1d4e89;--blue-bg:#dbeafe;--amber:#92400e;--amber-bg:#fef3c7;
  --today:#1d4e89;--today-bg:#dbeafe;
  --shared-spend:#1d4e89; /* dark blue for shared spend */
  --date-bg:#fef2cb; /* light yellow for date headers/day row */
  --disp-bg:#e2efd9; /* light green for disposable row */
  --row-h:32px;--col-cat:130px;--col-total:58px;--col-day:34px;--hdr-h:44px;--sb-w:320px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* Calibri stack used across the spreadsheet for data cells */
.stbl,.stbl td,.stbl th,.ca,.cn,.cc,.tc{font-family:Calibri,'Segoe UI',Arial,sans-serif!important}
.topbar{height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;z-index:100}
.logo{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.04em}
.sep{width:1px;height:20px;background:var(--border)}
.mnav{display:flex;align-items:center;gap:2px}
.mnav button{border:none;background:none;cursor:pointer;color:var(--text2);padding:4px 7px;border-radius:4px;font-size:16px;line-height:1}
.mnav button:hover{background:var(--bg)}
.mlbl{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;min-width:110px;text-align:center}
.ta{margin-left:auto;display:flex;gap:6px;align-items:center}
.btn{padding:6px 12px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);white-space:nowrap}
.btn:hover{background:var(--bg)}
.btn:disabled{opacity:.35;cursor:default}
.btn-p{background:var(--text);color:#fff;border-color:var(--text)}.btn-p:hover{background:#333}
.btn-danger{background:#dc2626;color:#fff;border-color:#dc2626}.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:4px 9px;font-size:12px}.btn-ghost{border-color:transparent}.btn-ghost:hover{background:var(--bg);border-color:var(--border)}
.tabbar{height:48px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:6px;flex-shrink:0}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .12s;line-height:1.2}
.tab:hover:not(.active){background:var(--bg);border-color:var(--text2)}
.tab.active{background:var(--text);color:#fff;border-color:var(--text);box-shadow:0 2px 6px rgba(0,0,0,.15)}
.main{flex:1;display:flex;overflow:hidden}
.sbar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.si{flex:1;padding:6px 12px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:0;line-height:1.15}
.si:last-child{border-right:none}
.sl{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em}
.sv{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
.pos{color:var(--green)}.neg{color:var(--red)}
/* recent action strip */
.recent-strip{background:var(--surface2);border-bottom:1px solid var(--border);padding:4px 14px;font-size:11.5px;color:var(--text2);display:flex;align-items:center;gap:8px;flex-shrink:0;font-family:'DM Mono',monospace}
.recent-strip .rs-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.recent-strip .rs-empty{color:var(--text3);font-style:italic}
.selbar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:8px;padding:8px 18px;font-family:'DM Mono',monospace;font-size:13px;display:flex;gap:16px;align-items:center;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.25);pointer-events:none;opacity:0;transition:opacity .15s}
.selbar.show{opacity:1}
.sheet-wrap{flex:1;overflow:auto}
.stbl{border-collapse:collapse;font-size:14.7px;min-width:max-content}

/* header row */
.stbl thead th{height:var(--hdr-h);background:var(--surface2);border:1px solid var(--border);padding:0 4px;white-space:nowrap;position:sticky;top:0;z-index:10;font-weight:500;color:var(--text2);font-size:13px;text-align:center;user-select:none;vertical-align:middle}
.stbl thead th.ch{text-align:left;width:var(--col-cat);min-width:var(--col-cat);position:sticky;left:0;z-index:20;background:var(--surface2);font-size:13px}
.stbl thead th.th{width:var(--col-total);min-width:var(--col-total);position:sticky;left:var(--col-cat);z-index:20;background:var(--surface2);font-size:13px}
.stbl thead th.dh{width:var(--col-day);min-width:var(--col-day);line-height:1.2;background:var(--date-bg)!important}
.stbl thead th .daynum{font-size:18.7px;font-weight:600;display:block}
.stbl thead th .dayname{font-size:10px;font-weight:400;color:var(--text3);display:block}
/* today highlight in header */
.stbl thead th.today-col{background:var(--today-bg)!important;color:var(--today)!important}
.stbl thead th.today-col .daynum{color:var(--today);font-weight:700}
.stbl thead th.today-col .dayname{color:var(--blue)}
/* month/week start borders */
.stbl thead th.month-start{border-left:3px solid #888!important}
.stbl thead th.week-start{border-left:2px solid var(--border2)!important}

.cc{position:sticky;left:0;z-index:5;border:1px solid var(--border);padding:0 7px;height:var(--row-h);white-space:nowrap;font-weight:500;font-size:18.7px;cursor:pointer;vertical-align:middle}
.cc:hover{filter:brightness(.97)}
.tc{position:sticky;left:var(--col-cat);z-index:5;border:1px solid var(--border);padding:0 6px;height:var(--row-h);text-align:right;font-weight:500;white-space:nowrap;vertical-align:middle;font-size:14.7px}
.dc{border:1px solid var(--border);height:auto;min-height:var(--row-h);vertical-align:top;padding:0;position:relative;min-width:var(--col-day)}
.dc.month-start{border-left:3px solid #888!important}
.dc.week-start{border-left:2px solid var(--border2)!important}
/* today column — only header and bottom day row get highlight, NOT data cells */

/* row types */
tr.ri .cc{color:var(--green);border-left:3px solid var(--green)}
tr.ri td{background:#f6fdf8}
tr.rs .cc{color:var(--shared-spend);border-left:3px solid var(--shared-spend)}
tr.rs td{background:var(--surface)}
tr.rp .cc{color:var(--red);border-left:3px solid var(--red)}
tr.rp td{background:#fef5f5}
tr.rt td{background:var(--surface2);font-weight:500}
tr.rt .cc{color:var(--text2);border-left:3px solid var(--border2);cursor:default}
tr.rdayrow td{background:var(--date-bg);border-top:2px solid var(--border2)}
tr.rdayrow .cc{color:var(--text2);cursor:default;border-left:3px solid var(--border2);background:var(--surface2)}
tr.rdayrow td.today-col{background:var(--today-bg)!important;color:var(--today)!important}
tr.rdayrow td .daynum{font-size:18.7px;font-weight:700;display:block}
tr.rdayrow td .dayname{font-size:10px;color:var(--text3);display:block}
tr.rb td{background:var(--disp-bg);font-weight:600;font-size:16px}
tr.rb .cc{color:var(--green);border-left:3px solid var(--green);cursor:default;background:var(--disp-bg)}
tr.rb .tc{background:var(--disp-bg)}

/* cell content */
.cstack{display:flex;flex-direction:column;width:100%}
.ce{padding:3px 5px;border-bottom:1px solid var(--border);cursor:pointer;min-height:28px;display:flex;flex-direction:column;justify-content:center;transition:background .1s;position:relative}
.ce:last-child{border-bottom:none}
.ce:hover{background:rgba(0,0,0,.04)}
/* selection overlay */
.ce.sel::after{content:'';position:absolute;inset:0;background:rgba(29,78,137,.18);border:2px solid var(--blue);pointer-events:none;border-radius:1px}
.ca{font-size:14.7px;text-align:right;white-space:nowrap}
.ca.confirmed{font-weight:500}.ca.forecast{opacity:.6}
/* default colours only when no custom colour set */
.ca.income-default{color:var(--green)}
.ca.spend-shared-default{color:var(--shared-spend)}
.ca.spend-personal-default{color:var(--red)}
.cn{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px;font-style:italic}
.cadd{width:100%;min-height:var(--row-h);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:16px;cursor:pointer;opacity:0}
.dc:hover .cadd{opacity:1}
.spip{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.spip.shared{background:var(--blue)}.spip.personal{background:var(--amber)}

/* sidebar */
.sidebar{width:var(--sb-w);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar.hidden{display:none}
.sbh{padding:12px 14px 9px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sbh h3{font-size:13px;font-weight:500;flex:1}
.sbb{flex:1;overflow-y:auto;padding:14px}
.sbf{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px}
.ecard{border:1px solid var(--border);border-radius:6px;padding:8px 10px;display:flex;align-items:flex-start;gap:8px;cursor:pointer;margin-bottom:6px}
.ecard:hover{border-color:var(--border2);background:var(--bg)}
.ecamt{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;white-space:nowrap}
.ecamt.income{color:var(--green)}.ecamt.spend{color:var(--red)}
.ecmeta{flex:1;display:flex;flex-direction:column;gap:2px}
.ecnote{font-size:11px;color:var(--text3);font-style:italic}
.ebadge{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:500;font-family:'DM Mono',monospace}
.bc{background:var(--green-bg);color:var(--green)}.bfo{background:var(--amber-bg);color:var(--amber)}.bp{background:var(--amber-bg);color:var(--amber)}

/* forms */
.fg{margin-bottom:13px}
.fl{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
.fc{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:5px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);outline:none}
.fc:focus{border-color:var(--blue)}
textarea.fc{resize:vertical;min-height:52px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tgg{display:flex;border:1px solid var(--border2);border-radius:5px;overflow:hidden}
.to{flex:1;padding:7px 8px;text-align:center;font-size:12px;cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;color:var(--text2)}
.to.active{background:var(--text);color:#fff}
.to.active.income{background:var(--green)}.to.active.spend{background:var(--red)}

/* modal */
.mbd{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:flex;align-items:center;justify-content:center}
.mbd.hidden{display:none}
.modal{background:var(--surface);border-radius:10px;width:460px;max-width:96vw;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.mhdr{padding:14px 18px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.mhdr h3{flex:1;font-size:14px;font-weight:500}
.mbody{padding:15px 18px;max-height:74vh;overflow-y:auto}
.mftr{padding:11px 18px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.dcbox{background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:9px 12px;margin-top:9px;display:none;font-size:13px;color:var(--red)}
.dcbox.show{display:block}

/* context menu */
.ctx{position:fixed;z-index:400;background:var(--surface);border:1px solid var(--border2);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:4px 0;min-width:200px;max-height:80vh;overflow-y:auto}
.ctx.hidden{display:none}
.cxi{padding:7px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text)}
.cxi:hover{background:var(--bg)}
.cxsep{height:1px;background:var(--border);margin:3px 0}
.cxlbl{padding:3px 14px;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em}
.cgrid{display:grid;grid-template-columns:repeat(8,20px);gap:3px;padding:6px 14px}
.csw{width:20px;height:20px;border-radius:3px;cursor:pointer;border:1px solid rgba(0,0,0,.12);transition:transform .1s}
.csw:hover{transform:scale(1.25)}
.ftbar{padding:6px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ftbtn{padding:3px 9px;font-size:12px;border:1px solid var(--border2);border-radius:4px;cursor:pointer;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.4}
.ftbtn:hover{background:var(--bg)}
.ftbtn.on{background:var(--text);color:#fff;border-color:var(--text)}
.ftsz{width:50px;padding:3px 6px;font-size:12px;border:1px solid var(--border2);border-radius:4px;outline:none;font-family:'DM Mono',monospace}
.ftcolgrid{display:grid;grid-template-columns:repeat(6,22px);gap:3px;padding:4px 14px}
.ftcsw{width:22px;height:22px;border-radius:3px;cursor:pointer;border:1px solid rgba(0,0,0,.15);transition:transform .1s}
.ftcsw:hover{transform:scale(1.2)}

/* split */
#view-split{flex:1;overflow-y:auto;padding:22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;align-items:flex-start}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;min-width:0}
.scard h3{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:12px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
.scard h4{font-size:10px;font-weight:500;color:var(--text3);margin-top:12px;margin-bottom:6px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;padding-top:8px;border-top:1px dashed var(--border)}
.scard h4:first-of-type{margin-top:0;padding-top:0;border-top:none}
.srow{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border);gap:8px}
.srow:last-child{border-bottom:none}
.srow.tot{font-weight:500;border-top:2px solid var(--border2);border-bottom:none;margin-top:4px;padding-top:8px}
.srow.sub{font-size:11.5px;color:var(--text2);padding:2px 0;border-bottom:none}
.srow.sub .sval{font-size:11.5px}
.srow.subtot{font-size:12px;color:var(--text);padding:4px 0;border-top:1px dotted var(--border);border-bottom:none;margin-top:2px;font-weight:500}
.sval{font-family:'DM Mono',monospace}
.src{background:var(--text);color:#fff;border-radius:8px;padding:22px;text-align:center;min-width:0}
.srclbl{font-size:11px;opacity:.6;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.srcamt{font-family:'DM Mono',monospace;font-size:34px;font-weight:500;margin-bottom:18px}
.srsave{display:flex;gap:10px;justify-content:center}
.srsi{background:rgba(255,255,255,.1);border-radius:6px;padding:9px 14px;text-align:center}
.srsil{font-size:11px;opacity:.6;margin-bottom:3px}
.srsiv{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.srig{margin-bottom:13px;text-align:left}
.srig label{font-size:11px;opacity:.7;display:block;margin-bottom:3px;font-family:'DM Mono',monospace}

/* vs Last Month tab */
#view-vs{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:18px}
.vs-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.vs-sum-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.vs-sum-card h3{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.vs-sum-card .vs-sum-icon{font-size:14px}
.vs-sum-card.good{border-left:3px solid var(--green)}
.vs-sum-card.bad{border-left:3px solid var(--red)}
.vs-sum-card ul{list-style:none;padding:0;margin:0}
.vs-sum-card li{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border);gap:8px}
.vs-sum-card li:last-child{border-bottom:none}
.vs-sum-card .vs-sum-cat{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vs-sum-card .vs-sum-val{font-family:'DM Mono',monospace;white-space:nowrap;font-size:12.5px}
.vs-sum-card .vs-sum-empty{color:var(--text3);font-style:italic;font-size:12px;padding:4px 0}
.vs-label-head{font-size:13px;color:var(--text2);font-family:'DM Mono',monospace}

/* vs Last Month table (now used in own tab) */
.vs-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px}
.vs-card h3{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:12px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:10px}
.vs-tbl{width:100%;border-collapse:collapse;font-size:13px}
.vs-tbl th{padding:8px 10px;background:var(--surface2);font-size:10px;font-weight:500;color:var(--text2);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);text-align:right}
.vs-tbl th:first-child{text-align:left}
.vs-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;text-align:right;font-size:13px}
.vs-tbl td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-size:13px}
.vs-tbl tr.vs-section td{background:var(--surface2);font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:500;padding:6px 10px;text-align:left}
.vs-tbl tr.vs-total td{font-weight:500;background:var(--surface2)}
.vs-tbl tr:last-child td{border-bottom:none}
.vs-up{color:var(--red)} /* spending more = red */
.vs-down{color:var(--green)} /* spending less = green */
.vs-neutral{color:var(--text3)}
.vs-pct{font-size:11px;color:var(--text3);margin-left:4px}
/* inline pct in srow (Your side) */
.srow .vs-pct-inline{font-size:11px;font-family:'DM Mono',monospace;margin-left:6px}
.srig input{width:100%;padding:6px 9px;border:1px solid rgba(255,255,255,.2);border-radius:5px;background:rgba(255,255,255,.1);color:#fff;font-family:'DM Mono',monospace;font-size:13px;outline:none}
.srig input:focus{border-color:rgba(255,255,255,.5)}

/* entry form */
#view-entry{flex:1;overflow-y:auto;padding:22px;display:flex;justify-content:center}
.efw{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:22px;width:100%;max-width:540px;height:fit-content}
.efw h2{font-size:14px;font-weight:500;margin-bottom:18px}

/* categories */
#view-cats{flex:1;overflow-y:auto;padding:22px;display:flex;justify-content:center}
.cw{width:100%;max-width:640px}
.cs{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;overflow:hidden}
.csh{padding:11px 15px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:500;color:var(--text2);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between}
.crow{display:flex;align-items:center;padding:9px 15px;border-bottom:1px solid var(--border);gap:9px}
.crow:last-child{border-bottom:none}
.cdot{width:16px;height:16px;border-radius:3px;flex-shrink:0;border:1px solid rgba(0,0,0,.12);cursor:pointer;transition:transform .1s}
.cdot:hover{transform:scale(1.15)}
.cni{flex:1;border:1px solid transparent;border-radius:4px;padding:4px 7px;font-size:13px;font-family:'DM Sans',sans-serif;background:transparent;color:var(--text);outline:none}
.cni:focus{border-color:var(--blue);background:var(--surface)}
.stog{display:flex;border:1px solid var(--border2);border-radius:4px;overflow:hidden}

// ── Entries ──
async function saveE(changedEntry){
  // if a specific entry is passed, upsert just that one; else upsert all
  const toSave=changedEntry?[changedEntry]:entries;
  const rows=toSave.map(e=>({id:Math.round(e.id),type:e.type,category:e.category,amount:e.amount,date:e.date,status:e.status,note:e.note||''}));
  const {error}=await supa.from('entries').upsert(rows,{onConflict:'id'});
  if(error)console.error('saveE error:',error);
}
async function deleteEntryDB(id){
  const {error}=await supa.from('entries').delete().eq('id',Math.round(id));

}

// ── Cell styles ──
async function saveCS(){
  // rebuild the whole cell_styles table from current state
  // delete all then re-insert (simpler than tracking individual changes)
  await supa.from('cell_styles').delete().neq('entry_id',0);
  const rows=Object.entries(cellStyles).map(([k,v])=>({entry_id:Math.round(k),styles:v}));
  if(rows.length){
    const {error}=await supa.from('cell_styles').upsert(rows,{onConflict:'entry_id'});
    if(error)console.error('saveCS error:',error);
  }
}
async function saveOneCS(id){

// ── Load everything ──
async function loadAll(){
  showLoading('Connecting to database…');

  // load entries
  const {data:eData,error:eErr}=await supa.from('entries').select('*');
  if(eErr)console.error('load entries error:',eErr);
  if(eData&&eData.length>0){
    entries=eData.map(r=>({id:r.id,type:r.type,category:r.category,amount:parseFloat(r.amount),date:r.date,status:r.status,note:r.note||''}));
  } else {
    showLoading('First run — seeding entries…');
    entries=MAY.map((e,i)=>({...e,id:i+1}));
    await saveE();
  }

  // load cats
  const {data:cData,error:cErr}=await supa.from('cats').select('*').order('sort_order',{ascending:true});
  if(cErr)console.error('load cats error:',cErr);
  if(cData&&cData.length>0){
    cats=cData.map(r=>({id:r.id,name:r.name,type:r.type,scope:r.scope,colour:r.colour||null}));
  } else {
    // first run — push default cats
    showLoading('First run — seeding categories…');
    await saveC();
  }

  // load cell styles
  const {data:csData,error:csErr}=await supa.from('cell_styles').select('*');
  if(csErr)console.error('load cell_styles error:',csErr);
  cellStyles={};
  if(csData){csData.forEach(r=>{cellStyles[r.entry_id]=r.styles;});}

  // load history
  const {data:hData,error:hErr}=await supa.from('history').select('*').order('ts',{ascending:false}).limit(500);
  if(hErr)console.error('load history error:',hErr);
  history=[];
  if(hData){
    history=hData.map(r=>({ts:r.ts,action:r.action,category:r.category,amount:r.amount,note:r.note||'',month:r.month,extra:r.extra||''}));
  }

  // load split config (Elena's salary / loan / other deductions)
  await loadSplitCfg();

  hideLoading();
}
function fmt(n){return'£'+Number(n).toFixed(2);}
function fmtR(n){return'£'+Math.round(n);}
function gc(name){return cats.find(c=>c.name===name);}
function escQ(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function fmtDate(d){const x=new Date(d+'T00:00:00');return x.getDate()+' '+MONTHS[x.getMonth()].slice(0,3);}
function isWeekStart(d){return new Date(cy,cm,d).getDay()===1;}
function isToday(d){return cy===todayYear&&cm===todayMonth&&d===todayDay;}

function me(){return entries.filter(e=>{const d=new Date(e.date+'T00:00:00');return d.getMonth()===cm&&d.getFullYear()===cy;});}

// ── Undo / Redo ──
function snapshot(){return JSON.parse(JSON.stringify(entries));}
function pushUndo(){undoStack.push(snapshot());if(undoStack.length>50)undoStack.shift();redoStack=[];updateUndoUI();}
async function undo(){
  if(!undoStack.length)return;
  redoStack.push(snapshot());
  entries=undoStack.pop();
  await saveE();renderAll();updateUndoUI();
}
async function redo(){
  if(!redoStack.length)return;
  undoStack.push(snapshot());
  entries=redoStack.pop();
  await saveE();renderAll();updateUndoUI();
}
function updateUndoUI(){
  document.getElementById('undoBtn').disabled=!undoStack.length;
  document.getElementById('redoBtn').disabled=!redoStack.length;
}

    amount:entry.amount||0,
    note:entry.note||'',
    month:MONTHS[cm]+' '+cy,
    extra:extra||''
  };
  history.unshift(record);
  if(history.length>500)history.pop();
  saveHist(record); // async, fire-and-forget
  renderRecentStrip();
}

}

// Split config — in-memory; loaded from Supabase in loadAll(), saved on edit.
let splitCfg={sal:1864,loan:114,oth:0};
let splitCfgLoaded=false;
function getSplitCfg(){return splitCfg;}
async function loadSplitCfg(){
  const {data,error}=await supa.from('app_config').select('value').eq('key','split_cfg').maybeSingle();
  if(error){console.error('load split_cfg error:',error);return;}
  if(data&&data.value){
    splitCfg={
      sal:Number(data.value.sal)||0,
      loan:Number(data.value.loan)||0,
      oth:Number(data.value.oth)||0
    };
  } else {
    // First run — no row yet, seed with current defaults
    console.log('Seeding split_cfg row with defaults:',splitCfg);
    const {error:seedErr}=await supa.from('app_config').insert({key:'split_cfg',value:splitCfg});
    if(seedErr)console.error('seed split_cfg error:',seedErr);
  }
  splitCfgLoaded=true;
}
async function saveSplitCfg(cfg){
  splitCfg={...cfg};
  const {error}=await supa.from('app_config').upsert({key:'split_cfg',value:cfg,updated_at:new Date().toISOString()},{onConflict:'key'});
  if(error)console.error('save split_cfg error:',error);
}

// Compute split for current month — returns {myRem, elDisp, owes, myF, elF, myInc, shSp, peSp, otherInc}
function computeSplit(){
  const me_=me();
  const cfg=getSplitCfg();
  const sal=cfg.sal||0,loan=cfg.loan||0,oth=cfg.oth||0;
  const elDisp=sal-loan-oth;
  // Salary = income from "My salary" category only
  const myInc=me_.filter(e=>e.type==='income'&&e.category==='My salary').reduce((s,e)=>s+e.amount,0);
  // Other incomes = everything except My salary and From Elena (excluded from split)
  const otherInc=me_.filter(e=>e.type==='income'&&e.category!=='My salary'&&e.category!=='From Elena').reduce((s,e)=>s+e.amount,0);
  const shSp=me_.filter(e=>e.type==='spend'&&gc(e.category)?.scope!=='personal').reduce((s,e)=>s+e.amount,0);
  const peSp=me_.filter(e=>e.type==='spend'&&gc(e.category)?.scope==='personal').reduce((s,e)=>s+e.amount,0);
  const myRem=myInc-shSp-peSp;
  const target=(myRem+elDisp)/2;
  const owes=Math.round(elDisp-target);
  const myF=Math.round(myRem+owes);
  const elF=Math.round(elDisp-owes);
  return{myInc,otherInc,shSp,peSp,myRem,elDisp,owes,myF,elF,sal,loan,oth};
}

function renderStats(){
  const me_=me();
  const days=new Date(cy,cm+1,0).getDate();
  const isCurMonth=cy===todayYear&&cm===todayMonth;
  const upToDay=isCurMonth?todayDay:days;
  let todayDisp=0;
  for(let d=1;d<=upToDay;d++){
    const inc=me_.filter(e=>e.type==='income'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    const sp=me_.filter(e=>e.type==='spend'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    todayDisp+=inc-sp;
  }
  let endDisp=0;
  for(let d=1;d<=days;d++){
    const inc=me_.filter(e=>e.type==='income'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    const sp=me_.filter(e=>e.type==='spend'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    endDisp+=inc-sp;
  }
  const peSp=me_.filter(e=>e.type==='spend'&&gc(e.category)?.scope==='personal').reduce((s,e)=>s+e.amount,0);
  const sp=computeSplit();
  const todayLbl=isCurMonth?"Today's disp.":"Month disp.";
  const owesCls=sp.owes>=0?'pos':'neg';
  document.getElementById('sbar').innerHTML=`
    <div class="si"><div class="sl">${todayLbl}</div><div class="sv ${todayDisp>=0?'pos':'neg'}">${fmtR(todayDisp)}</div></div>
    <div class="si"><div class="sl">Personal spend</div><div class="sv" style="color:var(--red)">${fmt(peSp)}</div></div>
    <div class="si"><div class="sl">End-of-month disp.</div><div class="sv ${endDisp>=0?'pos':'neg'}">${fmtR(endDisp)}</div></div>
    <div class="si"><div class="sl">Elena sends you</div><div class="sv ${owesCls}">${fmtR(sp.owes)}</div></div>`;
}

    const sp=me_.filter(e=>e.type==='spend'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    runT+=inc-sp;

  }

  const isEmpty=me_.length===0;

    body+=`<tr><td colspan="${days+2}" style="padding:20px;text-align:center;color:var(--text2)">No entries for this month. <button class="btn btn-sm btn-p" style="margin-left:10px" onclick="copyPrevMonth()">Copy from previous month</button></td></tr>`;

    const ce=me_.filter(e=>e.category===cat.name);

    const rowCls=isInc?'ri':isPers?'rp':'rs';
    const defBg=isInc?'#f6fdf8':isPers?'#fef5f5':'#ffffff';

    const amtCol=isInc?'var(--green)':isPers?'var(--red)':'var(--shared-spend)';

    body+=`<tr class="${rowCls}" oncontextmenu="openCatCtx(event,'${escQ(cat.name)}')">`;
    body+=`<td class="cc" style="background:${bg}" onclick="openCatSB('${escQ(cat.name)}')"><span class="spip ${cat.scope}"></span>${cat.name}</td>`;
    body+=`<td class="tc" style="background:${bg}"><span style="color:${amtCol}">${fmtR(total)}</span></td>`;

      const de=ce.filter(e=>new Date(e.date+'T00:00:00').getDate()===d);
      const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const ms=d===1,ws=!ms&&isWeekStart(d),tod=isToday(d);
      const dcls='dc'+(ms?' month-start':ws?' week-start':'')+(tod?' today-col':'');
      body+=`<td class="${dcls}" style="background:${bg}" ondblclick="openAddModal('${escQ(cat.name)}','${ds}')" oncontextmenu="openCellCtx(event,'${escQ(cat.name)}',${d})">`;
      if(de.length){
        body+='<div class="cstack">';
        de.forEach(tx=>{

          const isSel=selEntries.has(tx.id);

          body+=`<div class="ce${isSel?' sel':''}" style="${divSt}" onclick="handleCellClick(event,${tx.id},'${escQ(cat.name)}','${ds}')" oncontextmenu="openCellCtx(event,'${escQ(cat.name)}',${d},${tx.id})">

      } else {

      }

  const tInc=me_.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);

    const ms=d===1,ws=!ms&&isWeekStart(d),tod=isToday(d);
    body+=`<td class="dc${ms?' month-start':ws?' week-start':''}${tod?' today-col':''}" style="text-align:center;vertical-align:middle;font-size:12px;color:var(--green);font-weight:500;padding:0 2px">${s||''}</td>`;
  }

  // total spend row
  const tSp=me_.filter(e=>e.type==='spend').reduce((s,e)=>s+e.amount,0);
  body+=`<tr class="rt"><td class="cc">Total spend</td><td class="tc" style="color:var(--shared-spend)">${fmtR(tSp)}</td>`;
  for(let d=1;d<=days;d++){

    const ms=d===1,ws=!ms&&isWeekStart(d),tod=isToday(d);
    body+=`<td class="dc${ms?' month-start':ws?' week-start':''}${tod?' today-col':''}" style="text-align:center;vertical-align:middle;font-size:12px;color:var(--shared-spend);font-weight:500;padding:0 2px">${s||''}</td>`;
  }

  // bottom day row (repeated)

    body+=`<td class="dc${ms?' month-start':ws?' week-start':''}${tod?' today-col':''}" style="text-align:center;vertical-align:middle;padding:2px 0">

      <span class="dayname" style="color:${tod?'var(--blue)':'var(--text3)'}">${dow}</span>
    </td>`;
  }
  body+='</tr>';

  body+='</tbody>';
  document.getElementById('stbl').innerHTML=hdr+body;
}

// styles split: div gets only bgColor, span gets font/colour
function buildSpanStyle(cs,type,scope){
  const fw=cs.bold?'700':(cs.fontSize?'400':'500');
  const fi=cs.italic?'italic':'normal';
  const fs=(cs.fontSize||14.7)+'px';
  let defCol;
  if(type==='income')defCol='var(--green)';
  else if(scope==='personal')defCol='var(--red)';
  else defCol='var(--shared-spend)';
  const col=cs.color||defCol;
  return `font-weight:${fw};font-style:${fi};font-size:${fs};color:${col}`;
}

    renderSheet();updateSelBar();
  } else if(ev.shiftKey){
    ev.stopPropagation();

    renderSheet();updateSelBar();

}
function updateSelBar(){
  const sb=document.getElementById('selbar');

  const vals=Array.from(selEntries).map(id=>entries.find(e=>e.id===id)?.amount||0);
  const sum=vals.reduce((a,b)=>a+b,0);
  const avg=vals.length?sum/vals.length:0;
  sb.textContent=`${vals.length} selected  ·  Sum: £${sum.toFixed(2)}  ·  Avg: £${avg.toFixed(2)}`;
  sb.classList.add('show');
}

function openAddModal(cat,date){
  // If no category given, default to "Food & shop" if it exists, else first spend cat
  if(!cat){
    const def=cats.find(c=>c.name==='Food & shop')||cats.find(c=>c.type==='spend')||cats[0];
    cat=def?def.name:'';
  }
  // If no date given, default to today
  if(!date)date=new Date().toISOString().slice(0,10);
  const catObj=gc(cat);
  document.getElementById('m-title').textContent='Add entry'+(cat?' — '+cat:'');
  document.getElementById('m-body').innerHTML=buildForm({category:cat,date:date,type:catObj?.type||'spend',amount:'',status:'confirmed',note:''});

async function saveEntry(id){
  const cat=document.getElementById('m-cat').value;

  const date=document.getElementById('m-date').value;

  if(!amt||amt<=0||!date){alert('Please fill in amount and date.');return;}
  const catObj=gc(cat);
  const type=catObj?catObj.type:'spend';
  pushUndo();
  if(id){

// Get entries for a specific month/year
function entriesForMonth(month,year){
  return entries.filter(e=>{
    const d=new Date(e.date+'T00:00:00');
    return d.getMonth()===month&&d.getFullYear()===year;
  });
}

// Compute totals for a given month's entries — used by Split + vs Last Month
function monthTotals(monthEntries){
  const salary=monthEntries.filter(e=>e.type==='income'&&e.category==='My salary').reduce((s,e)=>s+e.amount,0);
  const otherInc=monthEntries.filter(e=>e.type==='income'&&e.category!=='My salary'&&e.category!=='From Elena').reduce((s,e)=>s+e.amount,0);
  const fromElena=monthEntries.filter(e=>e.type==='income'&&e.category==='From Elena').reduce((s,e)=>s+e.amount,0);
  const shSp=monthEntries.filter(e=>e.type==='spend'&&gc(e.category)?.scope!=='personal').reduce((s,e)=>s+e.amount,0);
  const peSp=monthEntries.filter(e=>e.type==='spend'&&gc(e.category)?.scope==='personal').reduce((s,e)=>s+e.amount,0);
  // per-category breakdowns for spend
  const shBy={},peBy={};
  monthEntries.filter(e=>e.type==='spend').forEach(e=>{
    const sc=gc(e.category)?.scope;
    if(sc==='personal'){peBy[e.category]=(peBy[e.category]||0)+e.amount;}
    else{shBy[e.category]=(shBy[e.category]||0)+e.amount;}
  });
  // Other income broken down by NOTE (not category) — "other / no notes" for empty
  const incBy={};
  monthEntries.filter(e=>e.type==='income'&&e.category!=='My salary'&&e.category!=='From Elena').forEach(e=>{
    const key=(e.note&&e.note.trim())?e.note.trim():'other / no notes';
    incBy[key]=(incBy[key]||0)+e.amount;
  });
  return{salary,otherInc,fromElena,shSp,peSp,shBy,peBy,incBy};
}

// Difference helpers — shared between Split (Your side) and vs tab
function diffOf(a,b){
  const d=a-b;
  const pct=b!==0?(d/Math.abs(b))*100:(a!==0?100:0);
  return{d,pct};
}
// spendKind=true: more spend = red, less = green. spendKind=false (income): more = green, less = red.
function fmtDiffHTML({d,pct},spendKind){
  if(Math.abs(d)<0.005)return`<span class="vs-neutral">±£0</span>`;
  const isUp=d>0;
  const cls=spendKind?(isUp?'vs-up':'vs-down'):(isUp?'vs-down':'vs-up');
  const sign=isUp?'+':'-';
  const pctStr=isFinite(pct)&&pct!==0?`<span class="vs-pct">(${sign}${Math.abs(pct).toFixed(0)}%)</span>`:'';
  return`<span class="${cls}">${sign}£${Math.abs(Math.round(d))} ${pctStr}</span>`;
}
// Inline pct (small) for Your side rows
function pctInlineHTML(cur,prev,spendKind){
  if(prev===0&&cur===0)return'';
  const{d,pct}=diffOf(cur,prev);
  if(Math.abs(d)<0.005)return`<span class="vs-pct-inline vs-neutral">±0%</span>`;
  const isUp=d>0;
  const cls=spendKind?(isUp?'vs-up':'vs-down'):(isUp?'vs-down':'vs-up');
  const sign=isUp?'+':'';
  if(!isFinite(pct))return`<span class="vs-pct-inline ${cls}">new</span>`;
  return`<span class="vs-pct-inline ${cls}">${sign}${pct.toFixed(0)}%</span>`;
}

    ${Object.keys(t.shBy).length?breakdownWithPct(t.shBy,pT.shBy,'var(--shared-spend)',true):''}
    <div class="srow subtot"><span>Shared balance</span><span class="sval">${fmt(t.salary-t.shSp)}</span></div>

      <div class="srow"><span>Other income <span style="font-size:10px;color:var(--text3)">(excl. from split)</span>${pctInlineHTML(t.otherInc,pT.otherInc,false)}</span><span class="sval pos">${fmt(t.otherInc)}</span></div>
      ${breakdownWithPct(t.incBy,pT.incBy,'var(--green)',false)}

    <div class="srow"><span>Personal spend${pctInlineHTML(t.peSp,pT.peSp,true)}</span><span class="sval neg">-${fmt(t.peSp)}</span></div>
    ${Object.keys(t.peBy).length?breakdownWithPct(t.peBy,pT.peBy,'var(--red)',true):''}

    <div class="srsi"><div class="srsil">Your savings</div><div class="srsiv">${fmt(sp.myF)}</div></div>
    <div class="srsi"><div class="srsil">Elena's savings</div><div class="srsiv">${fmt(sp.elF)}</div></div>`;

// ── vs Last Month tab ──
function renderVsTab(){
  // Prev month/year
  let pm=cm-1,py=cy;if(pm<0){pm=11;py--;}
  const curT=monthTotals(me());
  const pT=monthTotals(entriesForMonth(pm,py));

  // Compute item-level diffs for summary cards
  // For shared+personal spend: positive d (cur > prev) is bad; for income: positive d is good
  const items=[];
  const addItem=(label,cur,prev,kind)=>{
    if(cur===0&&prev===0)return;
    const{d,pct}=diffOf(cur,prev);
    items.push({label,cur,prev,d,pct,kind}); // kind: 'spend' | 'income'
  };

  // Shared spend categories
  Array.from(new Set([...Object.keys(curT.shBy),...Object.keys(pT.shBy)])).forEach(c=>{
    addItem(c,curT.shBy[c]||0,pT.shBy[c]||0,'spend');
  });
  // Personal spend categories
  Array.from(new Set([...Object.keys(curT.peBy),...Object.keys(pT.peBy)])).forEach(c=>{
    addItem(c+' (personal)',curT.peBy[c]||0,pT.peBy[c]||0,'spend');
  });
  // Salary
  addItem('My salary',curT.salary,pT.salary,'income');
  // Other incomes (by note)
  Array.from(new Set([...Object.keys(curT.incBy),...Object.keys(pT.incBy)])).forEach(n=>{
    addItem(n,curT.incBy[n]||0,pT.incBy[n]||0,'income');
  });

  // "Better" = good change. Spend down OR income up.
  // "Worse" = bad change. Spend up OR income down.
  const better=[],worse=[];
  items.forEach(it=>{
    if(Math.abs(it.d)<0.005)return;
    const isUp=it.d>0;
    const good=it.kind==='spend'?!isUp:isUp; // spend down OR income up = good
    (good?better:worse).push(it);
  });
  // Sort by absolute change (biggest impact first)
  better.sort((a,b)=>Math.abs(b.d)-Math.abs(a.d));
  worse.sort((a,b)=>Math.abs(b.d)-Math.abs(a.d));

  const renderList=(list,goodKind)=>{
    if(!list.length)return`<div class="vs-sum-empty">— nothing significant —</div>`;
    return`<ul>${list.slice(0,8).map(it=>{
      const isUp=it.d>0;
      const sign=isUp?'+':'-';
      const amount=`£${Math.abs(Math.round(it.d))}`;
      const pctStr=isFinite(it.pct)&&it.pct!==0?` (${sign}${Math.abs(it.pct).toFixed(0)}%)`:'';
      const cls=goodKind?'vs-down':'vs-up';
      const direction=isUp?'↑':'↓';
      return`<li><span class="vs-sum-cat" title="${it.label}">${direction} ${it.label}</span><span class="vs-sum-val ${cls}">${sign}${amount}${pctStr}</span></li>`;
    }).join('')}</ul>`;
  };

  // Net headline — total disposable change
  const curDisp=curT.salary+curT.otherInc+curT.fromElena-curT.shSp-curT.peSp;
  const prevDisp=pT.salary+pT.otherInc+pT.fromElena-pT.shSp-pT.peSp;
  const netDiff=diffOf(curDisp,prevDisp);
  const netSign=netDiff.d>0?'+':netDiff.d<0?'-':'±';
  const netCls=netDiff.d>0?'vs-down':netDiff.d<0?'vs-up':'vs-neutral';

  // Sub-helpers for the comparison table
  const shCats=Array.from(new Set([...Object.keys(curT.shBy),...Object.keys(pT.shBy)])).sort((a,b)=>(curT.shBy[b]||0)-(curT.shBy[a]||0));
  const peCats=Array.from(new Set([...Object.keys(curT.peBy),...Object.keys(pT.peBy)])).sort((a,b)=>(curT.peBy[b]||0)-(curT.peBy[a]||0));
  const incNotes=Array.from(new Set([...Object.keys(curT.incBy),...Object.keys(pT.incBy)])).sort((a,b)=>(curT.incBy[b]||0)-(curT.incBy[a]||0));

  const row=(label,cur,prev,spendKind)=>`<tr>
    <td>${label}</td>
    <td>${fmt(prev)}</td>
    <td>${fmt(cur)}</td>
    <td>${fmtDiffHTML(diffOf(cur,prev),spendKind)}</td>
  </tr>`;

  const wrap=document.getElementById('vs-wrap');
  wrap.innerHTML=`
    <div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap">
      <h2 style="font-size:18px;font-weight:500">vs Last Month</h2>
      <span class="vs-label-head">${MONTHS[pm]} ${py} → ${MONTHS[cm]} ${cy}</span>
      <span style="margin-left:auto;font-size:13px;color:var(--text2)">Net disposable change: <span class="${netCls}" style="font-family:'DM Mono',monospace;font-weight:500">${netSign}£${Math.abs(Math.round(netDiff.d))}</span></span>
    </div>

    <div class="vs-summary">
      <div class="vs-sum-card good">

        ${renderList(better,true)}
      </div>
      <div class="vs-sum-card bad">
        <h3><span class="vs-sum-icon">✕</span> What got worse</h3>
        ${renderList(worse,false)}
      </div>
    </div>

    <div class="vs-card">
      <h3>Full breakdown</h3>
      <table class="vs-tbl">
        <thead><tr><th>Category / Note</th><th>${MONTHS[pm].slice(0,3)} ${py}</th><th>${MONTHS[cm].slice(0,3)} ${cy}</th><th>Change</th></tr></thead>
        <tbody>
          <tr class="vs-section"><td colspan="4">Income</td></tr>
          ${row('My salary',curT.salary,pT.salary,false)}
          ${incNotes.map(n=>row(n,curT.incBy[n]||0,pT.incBy[n]||0,false)).join('')}
          ${(curT.fromElena||pT.fromElena)?row('From Elena',curT.fromElena,pT.fromElena,false):''}
          <tr class="vs-total">${row('Total income',curT.salary+curT.otherInc+curT.fromElena,pT.salary+pT.otherInc+pT.fromElena,false).replace(/^<tr>|<\/tr>$/g,'')}</tr>

          <tr class="vs-section"><td colspan="4">Shared spend</td></tr>
          ${shCats.length?shCats.map(c=>row(c,curT.shBy[c]||0,pT.shBy[c]||0,true)).join(''):'<tr><td colspan="4" style="color:var(--text3);font-style:italic;text-align:center">no shared spend</td></tr>'}
          <tr class="vs-total">${row('Total shared',curT.shSp,pT.shSp,true).replace(/^<tr>|<\/tr>$/g,'')}</tr>

          <tr class="vs-section"><td colspan="4">Personal spend</td></tr>
          ${peCats.length?peCats.map(c=>row(c,curT.peBy[c]||0,pT.peBy[c]||0,true)).join(''):'<tr><td colspan="4" style="color:var(--text3);font-style:italic;text-align:center">no personal spend</td></tr>'}
          <tr class="vs-total">${row('Total personal',curT.peSp,pT.peSp,true).replace(/^<tr>|<\/tr>$/g,'')}</tr>
        </tbody>
      </table>
    </div>`;
}

// ── Exports ──
function exportJSON(){
  const b=new Blob([JSON.stringify({entries,cats},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`fintrack-${MONTHS[cm].toLowerCase()}-${cy}.json`;a.click();
}
function exportCSV(){
  const me_=me(),days=new Date(cy,cm+1,0).getDate();
  const rows=[['Category','Total',...Array.from({length:days},(_,i)=>i+1)]];
  cats.forEach(cat=>{
    const ce=me_.filter(e=>e.category===cat.name);
    const total=ce.reduce((s,e)=>s+e.amount,0);
    rows.push([cat.name,total,...Array.from({length:days},(_,i)=>ce.filter(e=>new Date(e.date+'T00:00:00').getDate()===i+1).reduce((s,e)=>s+e.amount,0)||'')]);
  });
  let run=0;const disp=['Disposable',''];
  for(let d=1;d<=days;d++){
    const inc=me_.filter(e=>e.type==='income'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    const sp=me_.filter(e=>e.type==='spend'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    run+=inc-sp;disp.push(me_.some(e=>new Date(e.date+'T00:00:00').getDate()===d)?Math.round(run):'');
  }
  rows.push(disp);
  const csv=rows.map(r=>r.map(v=>JSON.stringify(v??'')).join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`fintrack-${MONTHS[cm].toLowerCase()}-${cy}.csv`;a.click();
}
function exportXLSX(){
  const me_=me(),days=new Date(cy,cm+1,0).getDate();
  const aoa=[['Category','Total',...Array.from({length:days},(_,i)=>i+1)]];
  cats.forEach(cat=>{
    const ce=me_.filter(e=>e.category===cat.name);
    aoa.push([cat.name,ce.reduce((s,e)=>s+e.amount,0)||null,...Array.from({length:days},(_,i)=>ce.filter(e=>new Date(e.date+'T00:00:00').getDate()===i+1).reduce((s,e)=>s+e.amount,0)||null)]);
  });
  let run=0;const disp=['Disposable',null];
  for(let d=1;d<=days;d++){
    const inc=me_.filter(e=>e.type==='income'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    const sp=me_.filter(e=>e.type==='spend'&&new Date(e.date+'T00:00:00').getDate()===d).reduce((s,e)=>s+e.amount,0);
    run+=inc-sp;disp.push(me_.some(e=>new Date(e.date+'T00:00:00').getDate()===d)?Math.round(run):null);
  }
  aoa.push(disp);
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,MONTHS[cm].slice(0,3)+' '+cy);
  XLSX.writeFile(wb,`fintrack-${MONTHS[cm].toLowerCase()}-${cy}.xlsx`);
}

loadAll().then(()=>renderAll());
